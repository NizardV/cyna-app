trigger:
  branches:
    include:
      - dev

pool:
  vmImage: ubuntu-latest

variables:
  GITHUB_REPO: "DiiageCUCDB/DI1-P5-E3_Cyna-App"
  GITHUB_BRANCH: main

steps:
  - checkout: self
    fetchDepth: 0
    persistCredentials: true

  - script: |
      git config user.email "azure-pipeline@noreply.com"
      git config user.name "Azure Pipeline"

      git remote add github https://$(GITHUB_PAT)@github.com/$(GITHUB_REPO).git

      git push github HEAD:refs/heads/$(GITHUB_BRANCH) --force
    displayName: "Force-push to GitHub $(GITHUB_BRANCH)"
    env:
      GITHUB_PAT: $(GITHUB_PAT)